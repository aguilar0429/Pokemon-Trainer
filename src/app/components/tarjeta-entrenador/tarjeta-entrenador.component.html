<div class="trainer-card">
    <!-- Dashboard mode shows "Entrenador" label and badge -->
    <div class="card-header" *ngIf="showBadge">
        <span class="trainer-label">Entrenador</span>
        <div class="badge-icon">
            <img src="medal.png"
             alt="Trainer Medal" class="medal" />
        </div>
    </div>

    <!-- Trainer name at top for team selection view -->
    <h3 class="card-name" *ngIf="showNameTop && profile">{{ profile.nombre }}</h3>

    <!-- Profile photo -->
    <div class="photo-container">
        <div class="photo-ring">
            <img *ngIf="profile?.fotoUrl" [src]="profile!.fotoUrl" [alt]="profile!.nombre" class="photo" />
            <div *ngIf="!profile?.fotoUrl" class="photo-placeholder"></div>
        </div>
    </div>

    <!-- Profile info -->
    <div class="card-info" *ngIf="showInfo && profile">
        <div class="info-row" *ngIf="profile.hobby">
            <span class="info-label">Pasatiempo:</span>
            <span class="info-value">{{ profile.hobby }}</span>
        </div>
        <div class="info-row">
            <span class="info-label">Edad:</span>
            <span class="info-value">{{ age }} años</span>
        </div>
        <div class="info-row" *ngIf="profile.documento && profile.documento.trim()">
            <span class="info-label">{{ profile.tipoDocumento === 'DUI' ? 'DUI:' : 'Carnet:' }}</span>
            <span class="info-value">{{ profile.documento }}</span>
        </div>
    </div>
</div>
